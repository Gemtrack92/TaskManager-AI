<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>
        TaskManager AI
    </title>


    <!-- Bootstrap 5 -->
    <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">


    <!-- CSS propio -->
    <link 
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">


</head>


<body class="bg-light">


<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-primary shadow">

<div class="container">

<span class="navbar-brand mb-0 h1">

📋 TaskManager AI

</span>


</div>

</nav>





<div class="container mt-4">



<!-- ALERTAS -->

<div id="alertContainer"></div>





<!-- ==========================
     DASHBOARD KPI
========================== -->


<div class="row g-3 mb-4">



<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h6>Total tareas</h6>

<h2 id="totalTasks">
0
</h2>

</div>

</div>

</div>




<div class="col-md-3">

<div class="card shadow text-center border-warning">

<div class="card-body">

<h6>Pendientes</h6>

<h2 id="pendingTasks">
0
</h2>

</div>

</div>

</div>




<div class="col-md-3">

<div class="card shadow text-center border-info">

<div class="card-body">

<h6>En progreso</h6>

<h2 id="progressTasks">
0
</h2>

</div>

</div>

</div>





<div class="col-md-3">

<div class="card shadow text-center border-success">

<div class="card-body">

<h6>Completadas</h6>

<h2 id="completedTasks">
0
</h2>

</div>

</div>

</div>



<div class="col-md-3">

<div class="card shadow text-center border-danger">

<div class="card-body">

<h6>Vencidas</h6>

<h2 id="overdueTasks">
0
</h2>

</div>

</div>

</div>



</div>







<!-- ==========================
     PROGRESO GENERAL
========================== -->


<div class="card shadow mb-4">


<div class="card-body">


<h5>
Progreso general
</h5>


<div class="progress">


<div

id="progressBar"

class="progress-bar"

role="progressbar"

style="width:0%">

0%

</div>


</div>


</div>


</div>







<!-- ==========================
     GRAFICOS
========================== -->


<div class="row mb-4">



<div class="col-md-6">


<div class="card shadow">


<div class="card-header">

Tareas por estado

</div>


<div class="card-body">

<canvas id="statusChart"></canvas>

</div>


</div>


</div>





<div class="col-md-6">


<div class="card shadow">


<div class="card-header">

Tareas por prioridad

</div>


<div class="card-body">


<canvas id="priorityChart"></canvas>


</div>


</div>


</div>



</div>









<!-- ==========================
     FORMULARIO
========================== -->


<div class="card shadow mb-4">


<div class="card-header bg-primary text-white">


<h5 id="formTitle">

Nueva tarea

</h5>


</div>




<div class="card-body">



<form id="taskForm">


<input

type="hidden"

id="taskId">






<div class="row">



<div class="col-md-6 mb-3">


<label class="form-label">

Título *

</label>


<input

type="text"

class="form-control"

id="titulo"

placeholder="Ingrese título">


</div>





<div class="col-md-6 mb-3">


<label class="form-label">

Fecha vencimiento

</label>


<input

type="date"

class="form-control"

id="fecha">


</div>



</div>







<div class="mb-3">


<label>

Descripción

</label>


<textarea

class="form-control"

id="descripcion"

rows="3"

placeholder="Detalle de la tarea">

</textarea>


</div>









<div class="row">



<div class="col-md-6">


<label>

Prioridad

</label>


<select

id="prioridad"

class="form-select">


<option value="Alta">

Alta

</option>


<option value="Media" selected>

Media

</option>


<option value="Baja">

Baja

</option>


</select>


</div>







<div class="col-md-6">


<label>

Estado

</label>


<select

id="estado"

class="form-select">


<option value="Pendiente">

Pendiente

</option>


<option value="En progreso">

En progreso

</option>


<option value="Completada">

Completada

</option>


</select>


</div>



</div>






<br>




<button

type="submit"

class="btn btn-success">

💾 Guardar tarea

</button>




<button

type="button"

onclick="clearForm()"

class="btn btn-secondary">

Limpiar

</button>



</form>



</div>


</div>









<!-- ==========================
     FILTROS
========================== -->


<div class="card shadow mb-4">


<div class="card-body">


<div class="row">



<div class="col-md-4">


<input

id="search"

class="form-control"

placeholder="🔎 Buscar tarea">


</div>






<div class="col-md-4">


<select

id="filterStatus"

class="form-select">


<option value="">

Todos los estados

</option>


<option>

Pendiente

</option>


<option>

En progreso

</option>


<option>

Completada

</option>


</select>


</div>







<div class="col-md-4">


<select

id="filterPriority"

class="form-select">


<option value="">

Todas las prioridades

</option>


<option>

Alta

</option>


<option>

Media

</option>


<option>

Baja

</option>


</select>


</div>



</div>


</div>


</div>









<!-- ==========================
     TABLA
========================== -->


<div class="card shadow">


<div class="card-header">


<h5>

Listado de tareas

</h5>


</div>





<div class="table-responsive">


<table class="table table-hover">


<thead class="table-primary">


<tr>


<th>ID</th>

<th>Título</th>

<th>Prioridad</th>

<th>Estado</th>

<th>Fecha</th>

<th>Acciones</th>


</tr>


</thead>




<tbody id="taskTable">


</tbody>


</table>


</div>



</div>






</div>









<!-- Chart.js -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>



<!-- Bootstrap JS -->

<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>




<!-- Javascript propio -->

<script

src="{{ url_for('static', filename='script.js') }}">

</script>




</body>

</html>
